<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Insights</title>
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface2: #27272a;
      --accent: #a78bfa;
      --accent2: #818cf8;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --muted: #71717a;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(167, 139, 250, 0.4);
      --radius: 16px;
      --glow: rgba(167, 139, 250, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      padding: 5rem 1.5rem 4rem;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40%; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-size: clamp(2.25rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 1rem;
      line-height: 1.1;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #c4b5fd 0%, #818cf8 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Main ── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .section-header h2 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .count-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
    }

    /* ── Grid ── */
    #insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* ── Cards ── */
    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .insight-card:hover {
      border-color: var(--border-hover);
      background: linear-gradient(135deg, var(--glow) 0%, var(--surface) 100%);
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-hover);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .card-date {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .card-summary {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }
    .card-cta svg {
      transition: transform 0.2s;
    }
    .insight-card:hover .card-cta svg {
      transform: translateX(3px);
    }

    /* ── Empty State ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
    }
    #empty-state .empty-icon {
      width: 56px; height: 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
    }
    #empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    #empty-state p {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.6;
    }
    #empty-state code {
      background: var(--surface2);
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    /* ── Loading ── */
    #loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error-state {
      display: none;
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      color: #fca5a5;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.02em;
    }
    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <header class="hero">
    <h1>My <span>Claude Insights</span></h1>
    <p>How I actually use Claude Code — the patterns, wins, and lessons from real sessions.</p>
  </header>

  <div class="divider"></div>

  <main class="main">
    <div class="section-header">
      <h2>Reports</h2>
      <span class="count-pill" id="count-badge">&mdash;</span>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      Loading insights&hellip;
    </div>
    <div id="error-state"></div>
    <div id="insights-grid" style="display:none"></div>
    <div id="empty-state">
      <div class="empty-icon">&#x1F4CA;</div>
      <h3>No reports yet</h3>
      <p>Run <code>/insights</code> to generate your first report.</p>
    </div>
  </main>

  <footer>
    Built with <a href="https://claude.ai">Claude</a>
  </footer>

  <script>
    const MANIFEST = 'insights/manifest.json';

    function formatDate(iso) {
      const d = new Date(iso + 'T12:00:00Z');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
    }

    function renderCard(entry) {
      const card = document.createElement('a');
      card.className = 'insight-card';
      card.href = entry.file;
      card.innerHTML = `
        <div>
          <div class="card-title">${entry.title}</div>
          <div class="card-date">${formatDate(entry.date)}</div>
        </div>
        <div class="card-summary">${entry.summary || 'View the full report for details.'}</div>
        <div class="card-footer">
          <div class="card-cta">
            Read report
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>
      `;
      return card;
    }

    async function init() {
      const loading = document.getElementById('loading');
      const grid = document.getElementById('insights-grid');
      const empty = document.getElementById('empty-state');
      const errEl = document.getElementById('error-state');
      const badge = document.getElementById('count-badge');

      try {
        const res = await fetch(MANIFEST);
        if (!res.ok) throw new Error(`Could not load manifest (HTTP ${res.status})`);
        const data = await res.json();

        loading.style.display = 'none';

        if (!Array.isArray(data) || data.length === 0) {
          empty.style.display = 'block';
          badge.textContent = '0';
          return;
        }

        const sorted = [...data].sort((a, b) => b.date.localeCompare(a.date));

        badge.textContent = `${sorted.length} report${sorted.length !== 1 ? 's' : ''}`;
        grid.style.display = 'grid';

        for (const entry of sorted) {
          grid.appendChild(renderCard(entry));
        }

      } catch (err) {
        loading.style.display = 'none';
        errEl.style.display = 'block';
        errEl.textContent = `Failed to load insights: ${err.message}`;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
